<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Scramble — Scorecard Intake</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Pacifico&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; min-height: 100vh; }
  * { box-sizing: border-box; }
  button { font: inherit; }
  input { font: inherit; }
  body { display: flex; align-items: flex-start; justify-content: center; padding: 48px 20px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="scorecard-intake.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "headerLabel": "CHECK-IN"
}/*EDITMODE-END*/;

const HEADER_OPTIONS = ["CHECK-IN", "TEE SHEET", "STARTER'S BOX", "FIRST TEE", "PLAYER CARD", "ON THE TEE"];

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAKS);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  React.useEffect(() => {
    window.__headerLabel = tweaks.headerLabel;
  }, [tweaks.headerLabel]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setTweaksOpen(true);
      if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setKey = (k, v) => {
    setTweaks((t) => {
      const nt = { ...t, [k]: v };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
      return nt;
    });
  };

  return (
    <>
    <div style={{ display: 'flex', gap: 60, alignItems: 'flex-start' }} data-screen-label="Scorecard Intake">
      {/* side notes */}
      <div style={{ width: 260, paddingTop: 40, fontFamily: '"Inter", system-ui' }}>
        <div style={{ fontFamily: '"Pacifico", cursive', fontSize: 28, color: '#3A7D44', marginBottom: 2 }}>
          Scramble
        </div>
        <div style={{ fontFamily: '"Playfair Display", serif', fontSize: 22, fontWeight: 700, color: '#1a1a2e', letterSpacing: -0.3, marginBottom: 14 }}>
          Scorecard intake
        </div>
        <div style={{ fontSize: 13, lineHeight: 1.6, color: '#5a6377', marginBottom: 22 }}>
          A working prototype. Tap any row on the card to edit it — the sheet slides up, you fill it in, it auto-advances. Signature writes itself as you type your name.
        </div>

        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1.5, color: '#9ca5b4', marginBottom: 10 }}>TRY IT</div>
        <ul style={{ margin: 0, padding: 0, listStyle: 'none', fontSize: 12, color: '#3d4254', lineHeight: 1.8 }}>
          <li>· Type your first name — watch it sign</li>
          <li>· Age, gender pills, handicap slider</li>
          <li>· Course search (try "peb" or "cyp")</li>
          <li>· Tap any row to jump back & edit</li>
          <li>· Complete all 5 → "Tee it up"</li>
        </ul>

        <div style={{ marginTop: 24, padding: '14px 16px', background: '#fff', borderRadius: 8, fontSize: 12, lineHeight: 1.55, color: '#3d4254', border: '1px solid rgba(0,0,0,0.06)' }}>
          <strong style={{ color: '#3A7D44' }}>Change:</strong> First name only — signature uses whatever you type, so "Marcus" signs as Marcus, not M. Chen.
        </div>
      </div>

      {/* the phone */}
      <div>
        <ScorecardIntake key={tweaks.headerLabel} />
        <div style={{ marginTop: 14, textAlign: 'center', fontFamily: '"Inter", system-ui', fontSize: 11, color: '#9ca5b4', letterSpacing: 0.5 }}>
          Interactive · tap anywhere on the card
        </div>
      </div>
    </div>

    {tweaksOpen && (
      <div style={{
        position: 'fixed', bottom: 20, right: 20, width: 260,
        background: '#fff', borderRadius: 14, padding: 18, zIndex: 1000,
        boxShadow: '0 20px 50px rgba(0,0,0,0.2), 0 0 0 1px rgba(0,0,0,0.08)',
        fontFamily: '"Inter", system-ui',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#1a1a2e', letterSpacing: 0.5, textTransform: 'uppercase' }}>Tweaks</div>
          <button onClick={() => setTweaksOpen(false)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#9ca5b4', fontSize: 16 }}>×</button>
        </div>
        <div style={{ fontSize: 11, color: '#9ca5b4', marginBottom: 8, fontWeight: 500 }}>Header label</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {HEADER_OPTIONS.map((h) => (
            <button key={h} onClick={() => setKey('headerLabel', h)} style={{
              padding: '8px 10px', borderRadius: 8, textAlign: 'left',
              background: tweaks.headerLabel === h ? '#3A7D44' : 'transparent',
              color: tweaks.headerLabel === h ? '#fff' : '#3d4254',
              border: `1px solid ${tweaks.headerLabel === h ? '#3A7D44' : '#e8ecf1'}`,
              fontSize: 11, fontWeight: 700, letterSpacing: 1.5, cursor: 'pointer',
            }}>{h}</button>
          ))}
        </div>
      </div>
    )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
